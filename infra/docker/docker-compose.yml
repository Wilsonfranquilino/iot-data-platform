name: iot-data-platform

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  data_platform:
    driver: bridge

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  minio_data:
  redpanda_data:
  lakekeeper_data:
  grafana_data:
  loki_data:

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ── Postgres — banco operacional (simula SCADA/MES) ─────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iot_pass}
      POSTGRES_DB: ${POSTGRES_DB:-iot_platform}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iot_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data_platform

  # ── MinIO — object storage (simula S3) ──────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - data_platform

  # ── MinIO Setup — cria buckets e políticas na inicialização ─────────────────
  minio-setup:
    image: minio/mc:latest
    container_name: minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
        mc mb --ignore-existing local/landing;
        mc mb --ignore-existing local/bronze;
        mc mb --ignore-existing local/silver;
        mc mb --ignore-existing local/gold;
        echo '✅ Buckets criados: landing, bronze, silver, gold';
      "
    networks:
      - data_platform

  # ── Lakekeeper — Iceberg REST Catalog ───────────────────────────────────────
  lakekeeper:
    image: quay.io/lakekeeper/catalog:latest
    container_name: lakekeeper
    restart: unless-stopped
    environment:
      LAKEKEEPER__BASE_URI: http://lakekeeper:8181
      LAKEKEEPER__WAREHOUSE_S3_ENDPOINT: http://minio:9000
      LAKEKEEPER__WAREHOUSE_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      LAKEKEEPER__WAREHOUSE_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      LAKEKEEPER__WAREHOUSE_S3_BUCKET: gold
    ports:
      - "8181:8181"
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - lakekeeper_data:/var/lib/lakekeeper
    networks:
      - data_platform

  # ── Redpanda — message broker (simula Kafka/MSK) ────────────────────────────
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --mode dev-container
      - --smp 1
      - --memory 512M
    ports:
      - "19092:19092"   # Kafka (externo)
      - "8080:8080"     # Redpanda Console
      - "8081:8081"     # Schema Registry
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - data_platform

  # ── Redpanda Console — UI web ────────────────────────────────────────────────
  redpanda-console:
    image: redpandadata/console:latest
    container_name: redpanda-console
    restart: unless-stopped
    environment:
      CONFIG_FILEPATH: /etc/redpanda/redpanda-console-config.yaml
    volumes:
      - ./infra/docker/redpanda-console.yaml:/etc/redpanda/redpanda-console-config.yaml:ro
    ports:
      - "8080:8080"
    depends_on:
      - redpanda
    networks:
      - data_platform

  # ── Dagster — orquestração do pipeline ──────────────────────────────────────
  dagster:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.dagster
    container_name: dagster
    restart: unless-stopped
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      POSTGRES_URL: postgresql://${POSTGRES_USER:-iot_user}:${POSTGRES_PASSWORD:-iot_pass}@postgres:5432/${POSTGRES_DB:-iot_platform}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      REDPANDA_BROKERS: redpanda:9092
      ICEBERG_CATALOG_URI: http://lakekeeper:8181
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./dagster:/opt/dagster/app
    networks:
      - data_platform

  # ── dbt — transformações (Silver → Gold) ────────────────────────────────────
  dbt:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.dbt
    container_name: dbt
    environment:
      DBT_POSTGRES_HOST: postgres
      DBT_POSTGRES_USER: ${POSTGRES_USER:-iot_user}
      DBT_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iot_pass}
      DBT_POSTGRES_DB: ${POSTGRES_DB:-iot_platform}
    volumes:
      - ./dbt_project:/usr/app/dbt
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data_platform

  # ── Metabase — BI dashboards ─────────────────────────────────────────────────
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER:-iot_user}
      MB_DB_PASS: ${POSTGRES_PASSWORD:-iot_pass}
      MB_DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data_platform

  # ── Prometheus — métricas ────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - data_platform

  # ── Grafana — dashboards de observabilidade ──────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - data_platform

  # ── Loki — logs centralizados ────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    networks:
      - data_platform
