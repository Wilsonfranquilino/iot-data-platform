iot_data_platform:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "{{ env_var('DBT_DUCKDB_PATH', 'C:/Projetos Claude/Iot/iot-data-platform/iot_platform.duckdb') }}"
      schema: main
      threads: 4

    postgres:
      type: postgres
      host: "{{ env_var('DBT_POSTGRES_HOST', 'localhost') }}"
      user: "{{ env_var('DBT_POSTGRES_USER', 'iot_user') }}"
      password: "{{ env_var('DBT_POSTGRES_PASSWORD', 'iot_pass') }}"
      port: 5432
      dbname: "{{ env_var('DBT_POSTGRES_DB', 'iot_platform') }}"
      schema: public
      threads: 4
