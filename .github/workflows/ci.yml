name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint (ruff + sqlfluff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint dependencies
        run: pip install ruff sqlfluff sqlfluff-templater-dbt

      - name: ruff — Python lint
        run: ruff check simulator/ dagster/

      - name: sqlfluff — SQL lint
        run: sqlfluff lint dbt_project/models/ --dialect duckdb

  dbt-compile:
    name: dbt compile
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: iot_user
          POSTGRES_PASSWORD: iot_pass
          POSTGRES_DB: iot_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt
        run: pip install dbt-core dbt-duckdb dbt-postgres

      - name: dbt compile
        working-directory: dbt_project
        env:
          DBT_POSTGRES_HOST: localhost
          DBT_POSTGRES_USER: iot_user
          DBT_POSTGRES_PASSWORD: iot_pass
          DBT_POSTGRES_DB: iot_platform
        run: dbt compile

  dbt-test:
    name: dbt test
    runs-on: ubuntu-latest
    needs: dbt-compile
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: iot_user
          POSTGRES_PASSWORD: iot_pass
          POSTGRES_DB: iot_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt + simulator deps
        run: pip install dbt-core dbt-duckdb dbt-postgres -r simulator/requirements.txt

      - name: Generate minimal seed data
        run: python simulator/historical_backfill.py --months 1 --fast

      - name: dbt seed
        working-directory: dbt_project
        env:
          DBT_POSTGRES_HOST: localhost
          DBT_POSTGRES_USER: iot_user
          DBT_POSTGRES_PASSWORD: iot_pass
          DBT_POSTGRES_DB: iot_platform
        run: dbt seed

      - name: dbt run
        working-directory: dbt_project
        env:
          DBT_POSTGRES_HOST: localhost
          DBT_POSTGRES_USER: iot_user
          DBT_POSTGRES_PASSWORD: iot_pass
          DBT_POSTGRES_DB: iot_platform
        run: dbt run

      - name: dbt test
        working-directory: dbt_project
        env:
          DBT_POSTGRES_HOST: localhost
          DBT_POSTGRES_USER: iot_user
          DBT_POSTGRES_PASSWORD: iot_pass
          DBT_POSTGRES_DB: iot_platform
        run: dbt test
